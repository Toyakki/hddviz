version: "2"

run:
  timeout: 5m
  build-tags:
    - cli
  modules-download-mode: vendor
  tests: false

linters:
  default: standard
  enable:
    - gosec
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  settings:
    gosec:
      excludes:
        - G304 # File inclusion via variable - expected for file encryption tool
        - G204 # Subprocess with variable - test builds
        - G115

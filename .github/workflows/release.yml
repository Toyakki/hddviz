name: release

on:
  push:
    branches: ["main"]
    paths:
      - "VERSION"
  # manual trigger for releases
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
        type: string
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            raw="${{ inputs.version }}"
          else
            raw="$(tr -d '[:space:]' < VERSION)"
          fi
          tag="v$raw"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"
      - name: Push a new tag
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: src/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.HDDVIZ_GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.HDDVIZ_TAP_GITHUB_TOKEN }}

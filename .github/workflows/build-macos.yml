name: build-macos

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  basiclint:
    runs-on: macos-15
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: src/go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need formatting:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...
  
  golangci-lint:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
          cache-dependency-path: src/go.sum
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ./src
          version: v2.11
  build:
    needs: 
      - basiclint
      - golangci-lint
    runs-on: macos-15
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: src/go.sum

      - name: Build
        run: go build -v ./...
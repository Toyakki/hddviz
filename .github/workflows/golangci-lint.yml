name: Lint & Format

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  Formatter:
    runs-on: macos-15
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
      - name: Run go fmt
        working-directory: src
        run: go fmt ./...
      - name: Run go vet
        working-directory: src
        run: go vet ./...
  
        
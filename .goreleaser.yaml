# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: hddviz

builds:
  - id: hddviz
    main: ./src
    binary: hddviz
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

universal_binaries:
  - id: hddviz
    replace: true

release:
  prerelease: auto

homebrew_casks:
  - name: hddviz
    repository:
      owner: hddviz
      name: homebrew-hddviz
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Toyakki
      email: lopko1001@gmail.com

    homepage: "https://github.com/Toyakki/hddviz"
    description: "CLI tool to simplify HDD usage visualization"
    license: "GPL-3.0-only"

    binaries:
      - hddviz

    url:
      verified: "github.com/Toyakki/hddviz/"

    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/hddviz"]
          end
